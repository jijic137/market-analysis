name: 每日金融数据更新

on:
  schedule:
    # 每天 UTC 时间 01:00 运行（北京时间 09:00）
    - cron: '0 1 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write  # 允许推送代码

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: 生成金融报告
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        echo "📊 开始生成金融报告..."
        python generate_report.py
        
    - name: 安装 CloudBase CLI
      run: npm install -g @cloudbase/cli
      
    - name: 登录 CloudBase
      run: |
        tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}
        
    - name: 部署到 CloudBase
      run: |
        echo "🚀 开始部署到 CloudBase..."
        tcb hosting deploy index.html /market-analysis/index.html -e market-analysis-5gxkqa835c2b5bf9
        echo "✅ 部署成功！"
        
    - name: 提交更新
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        git diff --quiet && git diff --staged --quiet || git commit -m "update: auto generate report"
        git push
        
    - name: 部署完成通知
      run: |
        echo "🎉 自动更新完成！"
        echo "🌐 访问地址: https://market-analysis-5gxkqa835c2b5bf9.tcloudbaseapp.com/market-analysis/index.html"
